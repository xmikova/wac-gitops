apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: pmdl-pharmacy-ufe-content
spec:
  microFrontend: pmdl-pharmacy-ufe
  element: pmdl-pharmacy-app # update to match the actual Stencil component tag name
  attributes:
    - name: base-path
      value: /pmdl-pharmacy/
    - name: api-base
      value: /pmdl-api
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?pmdl-pharmacy(/.*)?$"
