apiVersion: apps/v1
kind: Deployment
metadata:
  name: pmdl-pharmacy-ufe-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
        pod: pmdl-pharmacy-ufe-label
  template:
    metadata:
      labels:
        pod: pmdl-pharmacy-ufe-label
    spec:
      containers:
      - name: pharmacy-ufe-container
        image: xmikova/wac-fe
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080

        resources:
            requests:
                memory: "32M"
                cpu: "0.1"
            limits:
                memory: "320M"
                cpu: "0.3"
