apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: pmi-ambulance-ufe-content
spec:
  microFrontend: pmi-ambulance-ufe
  element: pmi-ambulance-wl-app
  attributes:
    - name: base-path
      value: /pmi-ambulance-wl/
    - name: api-base
      value: /pmi-api
    - name: ambulance-id
      value: bobulova
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?pmi-ambulance-wl(/.*)?$"